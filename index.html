<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game - Velocidade Progressiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .game-container {
            position: relative;
        }

        canvas {
            border: 2px solid #fff;
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="pong"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 400;

        const paddleWidth = 10;
        const paddleHeight = 100;
        let ballRadius = 8;
        
        // --- NOVIDADE: Velocidade inicial e incremento ---
        const velocidadeInicial = 4;
        const fatorAumento = 1.1; // Aumenta 10% a cada batida

        const user = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            dy: 0
        };

        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            dy: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: ballRadius,
            dx: velocidadeInicial,
            dy: velocidadeInicial,
            color: '#fff'
        };

        function drawPaddle(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawBall(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Colisão Usuário + Aumento de Velocidade
            if (ball.x - ball.radius < user.x + user.width &&
                ball.y > user.y && ball.y < user.y + user.height) {
                ball.dx = -ball.dx;
                
                // Aumenta a velocidade se não estiver muito rápida (limite de 15)
                if (Math.abs(ball.dx) < 15) {
                    ball.dx *= fatorAumento;
                    ball.dy *= fatorAumento;
                }
            }

            // Colisão Computador + Aumento de Velocidade
            if (ball.x + ball.radius > computer.x &&
                ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.dx = -ball.dx;

                if (Math.abs(ball.dx) < 15) {
                    ball.dx *= fatorAumento;
                    ball.dy *= fatorAumento;
                }
            }

            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                resetBall();
            }
        }

        // Função reset alterada para voltar à velocidade original
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            // Inverte o lado que a bola começa, mas reseta a força para o padrão
            ball.dx = (ball.dx > 0) ? -velocidadeInicial : velocidadeInicial;
            ball.dy = velocidadeInicial;
        }

        function moveUser() {
            user.y += user.dy;
            if (user.y < 0) user.y = 0;
            if (user.y + user.height > canvas.height) user.y = canvas.height - user.height;
        }

        function moveComputer() {
            // IA ligeiramente mais suave para acompanhar a bola rápida
            let alvoIA = ball.y - computer.height / 2;
            computer.y += (alvoIA - computer.y) * 0.1;

            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) computer.y = canvas.height - computer.height;
        }

        function update() {
            moveBall();
            moveUser();
            moveComputer();

            context.clearRect(0, 0, canvas.width, canvas.height);

            drawPaddle(user.x, user.y, user.width, user.height, user.color);
            drawPaddle(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color);

            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') user.dy = -6;
            else if (event.key === 'ArrowDown') user.dy = 6;
        });

        document.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowUp' || event.key === 'ArrowDown') user.dy = 0;
        });

        update();
    </script>
</body>
</html>
