<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game - 100% Automático</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .game-container {
            position: relative;
        }

        canvas {
            border: 2px solid #fff;
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="pong"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 400;

        const paddleWidth = 10;
        const paddleHeight = 100;
        let ballRadius = 8;
        
        const velocidadeInicial = 4;
        const fatorAumento = 1.1; 

        // Lado Esquerdo (Antigo Usuário, agora IA)
        const leftPaddle = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff'
        };

        // Lado Direito (Computador)
        const rightPaddle = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff'
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: ballRadius,
            dx: velocidadeInicial,
            dy: velocidadeInicial,
            color: '#fff'
        };

        function drawPaddle(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawBall(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Colisão Lado Esquerdo
            if (ball.x - ball.radius < leftPaddle.x + leftPaddle.width &&
                ball.y > leftPaddle.y && ball.y < leftPaddle.y + leftPaddle.height) {
                ball.dx = Math.abs(ball.dx); // Garante que a bola vá para a direita
                
                if (Math.abs(ball.dx) < 15) {
                    ball.dx *= fatorAumento;
                    ball.dy *= fatorAumento;
                }
            }

            // Colisão Lado Direito
            if (ball.x + ball.radius > rightPaddle.x &&
                ball.y > rightPaddle.y && ball.y < rightPaddle.y + rightPaddle.height) {
                ball.dx = -Math.abs(ball.dx); // Garante que a bola vá para a esquerda

                if (Math.abs(ball.dx) < 15) {
                    ball.dx *= fatorAumento;
                    ball.dy *= fatorAumento;
                }
            }

            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (ball.dx > 0) ? -velocidadeInicial : velocidadeInicial;
            ball.dy = velocidadeInicial;
        }

        // IA para o lado esquerdo
        function moveLeftAI() {
            let alvo = ball.y - leftPaddle.height / 2;
            // O valor 0.1 define a suavidade/velocidade da IA
            leftPaddle.y += (alvo - leftPaddle.y) * 0.1;

            if (leftPaddle.y < 0) leftPaddle.y = 0;
            if (leftPaddle.y + leftPaddle.height > canvas.height) leftPaddle.y = canvas.height - leftPaddle.height;
        }

        // IA para o lado direito
        function moveRightAI() {
            let alvo = ball.y - rightPaddle.height / 2;
            rightPaddle.y += (alvo - rightPaddle.y) * 0.1;

            if (rightPaddle.y < 0) rightPaddle.y = 0;
            if (rightPaddle.y + rightPaddle.height > canvas.height) rightPaddle.y = canvas.height - rightPaddle.height;
        }

        function update() {
            moveBall();
            moveLeftAI();
            moveRightAI();

            context.clearRect(0, 0, canvas.width, canvas.height);

            drawPaddle(leftPaddle.x, leftPaddle.y, leftPaddle.width, leftPaddle.height, leftPaddle.color);
            drawPaddle(rightPaddle.x, rightPaddle.y, rightPaddle.width, rightPaddle.height, rightPaddle.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color);

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
