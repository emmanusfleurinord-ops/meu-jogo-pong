<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game com Placar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            border: 4px solid #fff;
            background-color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="pong"></canvas>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 400;

        // Configurações do Jogo
        const paddleWidth = 10;
        const paddleHeight = 100;
        const INITIAL_SPEED = 4;
        const SPEED_INCREMENT = 1.1;

        // Placar
        let userScore = 0;
        let computerScore = 0;

        const user = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            dy: 0
        };

        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: '#fff',
            dy: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: INITIAL_SPEED,
            dy: INITIAL_SPEED,
            color: '#fff'
        };

        // Função para desenhar o Placar
        function drawScore() {
            context.fillStyle = "#fff";
            context.font = "45px Arial";
            // Pontos do Usuário (lado esquerdo)
            context.fillText(userScore, canvas.width / 4, 50);
            // Pontos do Computador (lado direito)
            context.fillText(computerScore, 3 * canvas.width / 4, 50);
            
            // Linha tracejada no meio
            context.setLineDash([10, 10]);
            context.beginPath();
            context.moveTo(canvas.width / 2, 0);
            context.lineTo(canvas.width / 2, canvas.height);
            context.strokeStyle = "#fff";
            context.stroke();
            context.setLineDash([]); // Reset do tracejado
        }

        function drawPaddle(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawBall(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2);
            context.fill();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            // Inverte direção e reseta velocidade
            ball.dx = (ball.dx > 0 ? -1 : 1) * INITIAL_SPEED;
            ball.dy = INITIAL_SPEED * (Math.random() > 0.5 ? 1 : -1);
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Colisão teto e chão
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Colisão Raquetes + Aumento de velocidade
            let player = (ball.x < canvas.width / 2) ? user : computer;
            
            if (checkCollision(ball, player)) {
                ball.dx = -ball.dx;
                // Aumenta velocidade até um limite
                if (Math.abs(ball.dx) < 16) {
                    ball.dx *= SPEED_INCREMENT;
                    ball.dy *= SPEED_INCREMENT;
                }
            }

            // PONTUAÇÃO
            if (ball.x + ball.radius > canvas.width) {
                userScore++; // Ponto para você
                resetBall();
            } else if (ball.x - ball.radius < 0) {
                computerScore++; // Ponto para a IA
                resetBall();
            }
        }

        function checkCollision(b, p) {
            return b.x + b.radius > p.x && b.x - b.radius < p.x + p.width &&
                   b.y + b.radius > p.y && b.y - b.radius < p.y + p.height;
        }

        function moveUser() {
            user.y += user.dy;
            if (user.y < 0) user.y = 0;
            if (user.y + user.height > canvas.height) user.y = canvas.height - user.height;
        }

        function moveComputer() {
            let targetY = ball.y - computer.height / 2;
            computer.y += (targetY - computer.y) * 0.1; // Inteligência da IA
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) computer.y = canvas.height - computer.height;
        }

        function update() {
            moveBall();
            moveUser();
            moveComputer();

            context.clearRect(0, 0, canvas.width, canvas.height);
            
            drawScore(); // Desenha o placar e a linha do meio
            drawPaddle(user.x, user.y, user.width, user.height, user.color);
            drawPaddle(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color);

            requestAnimationFrame(update);
        }

        // Controles do teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') user.dy = -7;
            if (e.key === 'ArrowDown') user.dy = 7;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') user.dy = 0;
        });

        update();
    </script>
</body>
</html>
